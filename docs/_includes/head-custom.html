<!-- THEOS favicon -->
<link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/theos_favicon.png">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/theos_favicon.png">

<!-- Social preview / Open Graph -->
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/theos_social.png">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/theos_social.png">
