name: Code Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  code_quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort bandit safety
      
      - name: Run Black (code formatting check)
        run: black --check code/ benchmarks/
      
      - name: Run isort (import sorting check)
        run: isort --check-only code/ benchmarks/
      
      - name: Run Flake8 (style guide)
        run: flake8 code/ benchmarks/ --max-line-length=100 --count
      
      - name: Run Pylint
        run: pylint code/ benchmarks/ --fail-under=8.0 || true
      
      - name: Run Bandit (security)
        run: bandit -r code/ benchmarks/ -f json -o bandit-report.json || true
      
      - name: Check dependencies for vulnerabilities
        run: safety check --json > safety-report.json || true
      
      - name: Upload quality reports
        uses: actions/upload-artifact@v3
        with:
          name: code-quality-reports
          path: |
            bandit-report.json
            safety-report.json

  unit_tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run unit tests
        run: pytest tests/ -v --cov=code --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  secret_scanning:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
