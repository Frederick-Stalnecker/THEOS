name: THEOS Multi-LLM Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'code/**'
      - 'benchmarks/**'
      - '.github/workflows/multi_llm_testing.yml'
  pull_request:
    branches: [main]
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  test_matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        llm: [claude, gpt4, gemini, llama, falcon, mistral, cohere, palm]
        cycles: [1, 2, 3]
      max-parallel: 6
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run THEOS tests on ${{ matrix.llm }} (${{ matrix.cycles }} cycles)
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: |
          python benchmarks/multi_llm_test_suite.py \
            --llm ${{ matrix.llm }} \
            --cycles ${{ matrix.cycles }} \
            --output results/test_${{ matrix.llm }}_${{ matrix.cycles }}_${{ github.run_number }}.json \
            --verbose
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.llm }}-${{ matrix.cycles }}
          path: results/test_*.json
          retention-days: 90
      
      - name: Generate test report
        if: always()
        run: |
          python benchmarks/generate_test_report.py \
            --input results/test_${{ matrix.llm }}_${{ matrix.cycles }}_*.json \
            --output results/report_${{ matrix.llm }}_${{ matrix.cycles }}.md

  aggregate_test_results:
    needs: test_matrix
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all test results
        uses: actions/download-artifact@v3
        with:
          path: all_test_results
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Generate cross-LLM comparison
        run: |
          pip install pandas matplotlib
          python benchmarks/generate_cross_llm_analysis.py \
            --input all_test_results \
            --output results/cross_llm_analysis_${{ github.run_number }}.md
      
      - name: Update dashboard with test results
        run: |
          python benchmarks/update_test_dashboard.py \
            --input all_test_results \
            --output docs/dashboard/test_data.json
      
      - name: Commit results
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add results/ docs/dashboard/
          git commit -m "🧪 Update multi-LLM test results [skip ci]" || echo "No changes"
          git push

  publish_results:
    needs: aggregate_test_results
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/dashboard
          cname: theos-benchmarks.github.io
