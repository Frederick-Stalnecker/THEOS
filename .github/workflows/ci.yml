name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test matrix ─────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package in editable mode + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest tests/ \
            --cov=code \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff black

      - name: ruff (lint)
        run: ruff check code/ examples/ tests/

      - name: black (format check)
        run: black --check --diff code/ examples/ tests/

  # ── Type checking ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: |
          mypy code/theos_core.py \
               code/theos_system.py \
               code/theos_governor.py \
               code/semantic_retrieval.py \
               --ignore-missing-imports \
               --no-strict-optional \
               --no-error-summary

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: bandit (SAST)
        run: |
          bandit -r code/ \
            --severity-level medium \
            --confidence-level medium \
            --quiet \
            --format txt \
            || true          # advisory: don't fail the build

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          if-no-files-found: ignore

  # ── MCP server smoke test ────────────────────────────────────────────────────
  mcp-smoke:
    name: MCP Server Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e ".[mcp]"

      - name: Verify MCP server imports without error
        run: |
          cd code
          python -c "
          import sys
          sys.path.insert(0, '.')
          # Verify core imports work
          from theos_dual_clock_governor import TheosDualClockGovernor, GovernorConfig, EngineOutput
          gov = TheosDualClockGovernor(GovernorConfig())
          left  = EngineOutput(engine_id='L', cycle_index=0, answer='Test answer L')
          right = EngineOutput(engine_id='R', cycle_index=0, answer='Test answer R')
          d = gov.step(left, right)
          assert d.decision in ('CONTINUE', 'FREEZE')
          print('MCP governor smoke test PASSED — decision:', d.decision)
          "
